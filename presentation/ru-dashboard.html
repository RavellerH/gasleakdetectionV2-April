<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GASGUARD v2.1 — Single RU Dashboard</title>
<style>
  :root {
    --bg: #07090e;
    --card: #0f1117;
    --card2: #161b26;
    --border: rgba(56,189,248,0.15);
    --cyan: #38bdf8;
    --cyan2: #7dd3fc;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
    --warn: #f59e0b;
    --success: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── Progress Bar ── */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--cyan), #818cf8);
    transition: width 0.4s ease;
    z-index: 999;
  }

  /* ── Slide Container ── */
  #slides-wrapper {
    width: 100vw; height: 100vh;
    position: relative;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: stretch;
    opacity: 0; pointer-events: none;
    transform: translateX(60px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    padding: 0;
  }
  .slide.active {
    opacity: 1; pointer-events: all;
    transform: translateX(0);
  }
  .slide.exit-left {
    opacity: 0;
    transform: translateX(-60px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  /* ── Title Slide ── */
  .slide-title {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(56,189,248,0.08) 0%, transparent 70%);
  }
  .slide-title .logo-ring {
    width: 120px; height: 120px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
    box-shadow: 0 0 60px rgba(56,189,248,0.2), inset 0 0 40px rgba(56,189,248,0.05);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 40px rgba(56,189,248,0.2), inset 0 0 30px rgba(56,189,248,0.05); }
    50%      { box-shadow: 0 0 80px rgba(56,189,248,0.35), inset 0 0 50px rgba(56,189,248,0.1); }
  }
  .slide-title h1 {
    font-size: 52px; font-weight: 800; letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .slide-title .sub { font-size: 16px; color: var(--muted); margin-bottom: 6px; }
  .slide-title .sub2 { font-size: 13px; color: var(--cyan); opacity: 0.7; margin-bottom: 36px; font-family: 'Geist Mono', monospace; letter-spacing: 1px; }
  .slide-title .badges {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 44px;
  }
  .badge {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3); color: var(--cyan);
    letter-spacing: 0.5px;
  }
  .badge.purple { background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.3); color: #818cf8; }
  .badge.green  { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.3);  color: #22c55e; }
  .badge.warn   { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: #f59e0b; }
  .stat-row {
    display: flex; gap: 28px; justify-content: center;
  }
  .stat-box {
    text-align: center; padding: 18px 26px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  }
  .stat-box .num { font-size: 32px; font-weight: 700; color: var(--cyan); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Normal Slide: Left (content) + Right (screenshot) ── */
  .slide-split { flex-direction: row; }
  .slide-left {
    width: 420px; min-width: 380px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 48px 36px 32px;
    position: relative;
    overflow-y: auto;
  }
  .slide-right {
    flex: 1;
    background: #0a0d14;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .slide-num {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--cyan); text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .slide-num::before {
    content: '';
    display: inline-block; width: 20px; height: 2px;
    background: var(--cyan); border-radius: 2px;
  }

  .slide-left h2 {
    font-size: 28px; font-weight: 800; letter-spacing: -1px;
    margin-bottom: 10px; line-height: 1.1;
  }
  .slide-left .tagline {
    font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5;
  }

  .feature-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .feature-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px; background: var(--card2); border-radius: 10px;
    border: 1px solid var(--border);
    animation: fade-up 0.4s ease both;
  }
  .feature-item:nth-child(1) { animation-delay: 0.05s; }
  .feature-item:nth-child(2) { animation-delay: 0.12s; }
  .feature-item:nth-child(3) { animation-delay: 0.19s; }
  .feature-item:nth-child(4) { animation-delay: 0.26s; }
  .feature-item:nth-child(5) { animation-delay: 0.33s; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fi-icon {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: rgba(56,189,248,0.1);
  }
  .fi-icon.warn   { background: rgba(245,158,11,0.1); }
  .fi-icon.green  { background: rgba(34,197,94,0.1); }
  .fi-icon.purple { background: rgba(129,140,248,0.1); }
  .fi-icon.red    { background: rgba(239,68,68,0.1); }
  .fi-body strong { font-size: 13px; font-weight: 600; display: block; margin-bottom: 2px; }
  .fi-body span   { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .tech-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
  .tech-tag {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted); font-family: 'Geist Mono', monospace;
  }

  .screen-frame {
    width: 100%; max-height: 100%;
    border-radius: 10px;
    border: 1px solid rgba(56,189,248,0.12);
    box-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    overflow: hidden;
    position: relative;
  }
  .screen-frame img { width: 100%; height: auto; display: block; }

  .callout {
    position: absolute;
    background: rgba(7,9,14,0.92);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 11px; font-weight: 600;
    color: var(--cyan);
    white-space: nowrap;
    animation: callout-in 0.5s ease both;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .callout::before { content: '●'; margin-right: 5px; font-size: 8px; }
  @keyframes callout-in {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .callout-red   { border-color: var(--danger); color: var(--danger); }
  .callout-green { border-color: var(--success); color: var(--success); }
  .callout-warn  { border-color: var(--warn); color: var(--warn); }
  .callout-purple { border-color: #818cf8; color: #818cf8; }

  /* ── Arch/Summary slide ── */
  .slide-arch {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 48px;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(56,189,248,0.05) 0%, transparent 70%);
  }
  .arch-title { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
  .arch-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; text-align: center; }

  .diff-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    max-width: 960px; width: 100%; margin-bottom: 32px;
  }
  .diff-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 22px;
  }
  .diff-card .dc-head {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .diff-card .dc-head.warn { color: var(--warn); }
  .diff-card ul { padding-left: 14px; }
  .diff-card li { font-size: 12px; color: var(--muted); margin-bottom: 5px; line-height: 1.5; }
  .diff-card li strong { color: var(--text); font-weight: 600; }

  .summary-row {
    display: flex; gap: 16px; max-width: 960px; width: 100%;
  }
  .summary-pill {
    flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; text-align: center;
  }
  .summary-pill .sp-icon { font-size: 22px; margin-bottom: 6px; }
  .summary-pill .sp-label { font-size: 12px; font-weight: 700; color: var(--cyan); margin-bottom: 3px; }
  .summary-pill .sp-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }

  /* glow effects on slide-right */
  .glow-top { position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 65%); pointer-events: none; }
  .glow-bot { position: absolute; bottom: -100px; left: -100px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(129,140,248,0.05) 0%, transparent 65%); pointer-events: none; }

  /* ── Navigation ── */
  #nav {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px;
    background: rgba(15,17,23,0.9); border: 1px solid var(--border);
    border-radius: 40px; padding: 10px 20px;
    backdrop-filter: blur(20px);
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 6px 10px;
    border-radius: 8px; transition: color 0.2s, background 0.2s;
    display: flex; align-items: center;
  }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #slide-counter {
    font-size: 13px; color: var(--muted); min-width: 60px; text-align: center;
    font-family: 'Geist Mono', monospace;
  }
  .dot-row { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .dot.active { background: var(--cyan); width: 18px; border-radius: 3px; }

  #key-hint {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--muted); opacity: 1; transition: opacity 1s;
  }
  #key-hint.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="slides-wrapper"></div>

<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="goSlide(-1)" title="Previous (←)">&#8592;</button>
  <div class="dot-row" id="dot-row"></div>
  <span id="slide-counter">1 / 11</span>
  <button class="nav-btn" id="btn-next" onclick="goSlide(1)" title="Next (→)">&#8594;</button>
</div>
<div id="key-hint">Press ← → arrow keys or click dots to navigate</div>

<script>
const slides = [

  // 0 — TITLE
  { type: 'title' },

  // 1 — LOGIN
  {
    type: 'split',
    num: '01 / Login',
    h2: 'Secure Entry Point',
    tagline: 'Each RU deployment runs its own isolated GASGUARD instance. Login is scoped to the unit — operators only see data for their assigned refinery.',
    features: [
      { icon: '🔐', cls: '', title: 'Email Authentication', desc: 'Enter registered email (e.g. admin@gld.com). No password in dev mode — production gates via Keycloak JWT.' },
      { icon: '🏭', cls: 'purple', title: 'RU-Scoped Session', desc: 'The RU ID is set at deployment time via NEXT_PUBLIC_RU_ID. Operators cannot switch units after login.' },
      { icon: '🛡️', cls: 'green', title: 'Restricted Access Banner', desc: '"RESTRICTED ACCESS — SYSTEM LOGS ACTIVE" reminder shown beneath login form.' },
      { icon: '🔒', cls: 'red', title: 'Production Plan', desc: 'Keycloak JWT per-RU tenant guard with role-based access: ADMIN → OPERATOR → VIEWER.' },
    ],
    tech: ['Next.js 15', 'GraphQL login', 'LocalStorage session', 'NestJS auth'],
    img: 'screenshots-ru/01-login.png',
    callouts: [
      { text: 'GASGUARD v2.1', style: 'top:28%; left:50%; transform:translate(-50%,-50%)', delay: 0.3 },
      { text: 'OPERATIONAL CONTROL PORTAL', style: 'top:38%; left:50%; transform:translate(-50%,-50%)', delay: 0.45, cls: 'callout-green' },
    ],
  },

  // 2 — OVERVIEW
  {
    type: 'split',
    num: '02 / Overview',
    h2: 'RU Overview Dashboard',
    tagline: 'Real-time command centre for one Refinery Unit. KPI cards, per-sensor gas heatmap, and device-type health breakdown — all scoped to the active RU.',
    features: [
      { icon: '📊', cls: '', title: 'KPI Cards', desc: 'Total devices, online count, avg health %, compliance rate, active alerts, avg battery — each with sparkline trend.' },
      { icon: '🌡️', cls: 'warn', title: 'Gas / Environment Heatmap', desc: 'Hour × sensor grid (00–23h). Cell color = AI confidence level: dark blue = low/none, amber = MIDDLE risk, red = HIGH risk.' },
      { icon: '🏥', cls: 'green', title: 'Refinery Unit Health', desc: 'Battery % and signal strength (RSSI dBm) per RU row — instantly spot which layer needs maintenance.' },
      { icon: '⚡', cls: 'purple', title: 'Health by Device Type', desc: 'Sensor / Cluster Head / Gateway rows with avg battery and signal bars — pinpoint which tier is degrading.' },
    ],
    tech: ['Recharts', 'GraphQL polling 10s', 'SensorTimeline API', 'React state'],
    img: 'screenshots-ru/02-overview.png',
    callouts: [
      { text: 'KPI cards + sparklines', style: 'top:16%; right:10%', delay: 0.3 },
      { text: 'Gas heatmap (hour × sensor)', style: 'top:48%; right:10%', delay: 0.5, cls: 'callout-warn' },
      { text: 'Device-type health', style: 'bottom:18%; right:10%', delay: 0.7, cls: 'callout-green' },
    ],
  },

  // 3 — DEVICES
  {
    type: 'split',
    num: '03 / Devices',
    h2: 'Device Fleet Table',
    tagline: 'Every sensor node, cluster head, and gateway registered to this RU. Filter by type, sort by health or battery, and rename any device inline.',
    features: [
      { icon: '📋', cls: '', title: 'Full Fleet Table', desc: 'Columns: Device name, Type, Site (RU), Battery bar + %, RSSI signal, Health badge, Status pulse, Rename action.' },
      { icon: '🔍', cls: 'purple', title: 'Type Filter + Sort', desc: 'Filter buttons: ALL / GATEWAY / CLUSTER / SENSOR. Sort by Health, Battery, or RSSI in asc/desc.' },
      { icon: '✏️', cls: 'green', title: 'Inline Rename', desc: 'Click "Rename" on any row → modal → persisted to SQLite via GraphQL mutation immediately.' },
      { icon: '🚨', cls: 'red', title: 'Alert Highlight', desc: 'Rows where AI confidence ≥ WARNING threshold show a red icon background to flag active gas events.' },
    ],
    tech: ['GraphQL devices query', 'Prisma', 'SQLite', 'updateDeviceName mutation'],
    img: 'screenshots-ru/03-devices.png',
    callouts: [
      { text: 'Type filter tabs', style: 'top:13%; right:10%', delay: 0.3 },
      { text: 'Health + Battery columns', style: 'top:45%; right:10%', delay: 0.5, cls: 'callout-warn' },
      { text: 'Status pulse indicator', style: 'bottom:25%; right:10%', delay: 0.7, cls: 'callout-green' },
    ],
  },

  // 4 — UNIT LAYOUT
  {
    type: 'split',
    num: '04 / Unit Layout',
    h2: 'Network Topology',
    tagline: 'Visual LoRa mesh tree scoped to this RU. Three tiers rendered as an SVG hierarchy: Gateway at root, Cluster Heads in mid layer, Sensor Nodes at leaves.',
    features: [
      { icon: '🌐', cls: '', title: 'Three-Tier Hierarchy', desc: 'Gateway (1 per RU) → Cluster Heads (4 per RU) → GLD Sensor Nodes (up to 28 per RU).' },
      { icon: '📡', cls: 'purple', title: 'LoRa Dual-Radio', desc: 'Radio A: 920 MHz SF7 STAR (GLD→CH). Radio B: 921 MHz SF9 MESH (CH→Gateway). Rendered as labelled edges.' },
      { icon: '🔵', cls: 'green', title: 'Color-Coded Status', desc: 'Node fill: cyan = ONLINE, amber = WARNING, red = OFFLINE or active alarm. Click a node to select device.' },
      { icon: '📊', cls: 'warn', title: 'Live Device Count', desc: 'Node labels show device name + last-seen health score. Click selects the device across all tabs.' },
    ],
    tech: ['SVG rendering', 'React state', 'GraphQL devices', 'UnitLayoutMap component'],
    img: 'screenshots-ru/04-unit-layout.png',
    callouts: [
      { text: 'Gateway (root)', style: 'top:18%; left:25%', delay: 0.3 },
      { text: 'Cluster Heads (mid)', style: 'top:42%; left:25%', delay: 0.5, cls: 'callout-warn' },
      { text: 'Sensor Nodes (leaf)', style: 'top:68%; left:25%', delay: 0.7, cls: 'callout-green' },
    ],
  },

  // 5 — MAP
  {
    type: 'split',
    num: '05 / Map View',
    h2: 'Geospatial Map',
    tagline: 'Mapbox GL JS satellite view for this RU. Markers show health-colored device positions. Drag any marker to reposition — saved to the database instantly.',
    features: [
      { icon: '🗺️', cls: '', title: 'Mapbox GL JS', desc: 'Satellite / dark-v11 basemap with optional 3D building extrusions. Auto-fits to RU device bounds on load.' },
      { icon: '📍', cls: 'green', title: 'Health-Colored Markers', desc: 'Cyan = healthy, amber = warning, red = critical/offline. Pulsing ring on devices with active gas alerts.' },
      { icon: '🔵', cls: 'purple', title: 'Supercluster Grouping', desc: 'Markers auto-cluster at low zoom. Cluster bubble shows count; zoom in to expand individual pins.' },
      { icon: '↔️', cls: 'warn', title: 'Drag-to-Reposition', desc: 'Drag any pin to update device coordinates — mutations persisted via GraphQL, no page reload needed.' },
    ],
    tech: ['Mapbox GL JS', 'react-map-gl', 'supercluster', 'GraphQL updateDevicePosition'],
    img: 'screenshots-ru/05-map.png',
    callouts: [
      { text: 'Device markers (health color)', style: 'top:35%; left:28%', delay: 0.3 },
      { text: 'Satellite basemap', style: 'bottom:22%; right:10%', delay: 0.5, cls: 'callout-green' },
    ],
  },

  // 5b — MAP POPUP
  {
    type: 'split',
    num: '05b / Map View',
    h2: 'Device Popup',
    tagline: 'Click any marker to inspect the device inline. The popup shows real-time AI confidence, risk level, battery, signal, and health — without leaving the map.',
    features: [
      { icon: '📋', cls: '', title: 'Device Identity', desc: 'Type badge (GATEWAY / CLUSTER / SENSOR), RU label, and device name shown at the top of the popup.' },
      { icon: '🤖', cls: 'red', title: 'AI Confidence + Risk', desc: 'For SENSOR nodes: confidence score (0.00–1.00) and risk label (● SAFE / ⚠ MIDDLE / ⚠ HIGH) with color-coded background.' },
      { icon: '🔋', cls: 'warn', title: 'Battery · Signal · Health', desc: 'Three-column grid: Battery %, RSSI dBm, Health % — all in Geist Mono for quick readability.' },
      { icon: '↔️', cls: 'green', title: 'Drag-to-Reposition', desc: 'Drag the open marker to a new position. Coordinates are saved to SQLite via GraphQL mutation instantly.' },
    ],
    tech: ['react-map-gl Popup', 'Mapbox GL JS', 'selectedDevice state', 'GraphQL'],
    img: 'screenshots-ru/05-map-popup.png',
    callouts: [
      { text: 'Device type + RU label', style: 'top:22%; right:10%', delay: 0.3 },
      { text: 'Battery · Signal · Health', style: 'bottom:28%; right:10%', delay: 0.5, cls: 'callout-green' },
    ],
  },

  // 6 — ALERTS
  {
    type: 'split',
    num: '06 / Alerts',
    h2: 'Alert Console',
    tagline: 'Live alarm feed filtered to this RU. Triggers when the AI model classifies a gas event with high confidence. Operators acknowledge and resolve alerts here.',
    features: [
      { icon: '🤖', cls: 'red', title: 'AI-Driven Triggers', desc: 'Alert fires when predicted_class ≠ 0 AND confidence ≥ HIGH threshold (default 0.80). 9 gas classes supported.' },
      { icon: '🚨', cls: 'red', title: 'Risk Levels', desc: 'HIGH: conf ≥ 0.80. MIDDLE: conf 0.70–0.79. LOW: below threshold. Badge color reflects severity.' },
      { icon: '✅', cls: 'green', title: 'Status Workflow', desc: 'ACTIVE → ACKNOWLEDGED → RESOLVED. Each transition logged in EventLog. Bell counter auto-decrements.' },
      { icon: '🔔', cls: 'warn', title: 'Red Bell Badge', desc: 'Sidebar "Alerts" item shows live unresolved count. In this RU, only this unit\'s alerts are shown.' },
    ],
    tech: ['AI classification', 'GraphQL alerts', 'EventLog mutation', 'status transitions'],
    img: 'screenshots-ru/06-alerts.png',
    callouts: [
      { text: 'Risk badge (HIGH / MID)', style: 'top:28%; right:10%', delay: 0.3, cls: 'callout-red' },
      { text: 'Acknowledge button', style: 'bottom:32%; right:10%', delay: 0.5, cls: 'callout-green' },
    ],
  },

  // 7 — EVENTS
  {
    type: 'split',

// ── Render ──────────────────────────────────────────────────────────────────

// ── Navigation ────────────────────────────────────────────────────────────
let current = 0;
const total = slides.length;
const dotRow = document.getElementById('dot-row');
const counter = document.getElementById('slide-counter');
const progressBar = document.getElementById('progress-bar');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const keyHint = document.getElementById('key-hint');

for (let i = 0; i < total; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotRow.appendChild(d);
}

function goTo(idx) {
  if (idx < 0 || idx >= total) return;
  const prev = document.getElementById(`slide-${current}`);
  prev.classList.remove('active');
  prev.classList.add('exit-left');
  setTimeout(() => prev.classList.remove('exit-left'), 400);

  current = idx;
  const next = document.getElementById(`slide-${current}`);
  next.classList.add('active');

  const dots = dotRow.querySelectorAll('.dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
  counter.textContent = `${current + 1} / ${total}`;
  progressBar.style.width = `${((current + 1) / total) * 100}%`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === total - 1;
}

function goSlide(dir) { goTo(current + dir); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goSlide(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); goSlide(-1); }
});

setTimeout(() => keyHint.classList.add('hidden'), 5000);
goTo(0);
</script>
