<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GASGUARD v2.1 — System Presentation</title>
<style>
  :root {
    --bg: #07090e;
    --card: #0f1117;
    --card2: #161b26;
    --border: rgba(56,189,248,0.15);
    --cyan: #38bdf8;
    --cyan2: #7dd3fc;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #38bdf8;
    --danger: #ef4444;
    --warn: #f59e0b;
    --success: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── Progress Bar ── */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--cyan), #818cf8);
    transition: width 0.4s ease;
    z-index: 999;
  }

  /* ── Slide Container ── */
  #slides-wrapper {
    width: 100vw; height: 100vh;
    position: relative;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: stretch;
    opacity: 0; pointer-events: none;
    transform: translateX(60px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    padding: 0;
  }
  .slide.active {
    opacity: 1; pointer-events: all;
    transform: translateX(0);
  }
  .slide.exit-left {
    opacity: 0;
    transform: translateX(-60px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  /* ── Title Slide ── */
  .slide-title {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(56,189,248,0.08) 0%, transparent 70%);
  }
  .slide-title .logo-ring {
    width: 120px; height: 120px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
    box-shadow: 0 0 60px rgba(56,189,248,0.2), inset 0 0 40px rgba(56,189,248,0.05);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 40px rgba(56,189,248,0.2), inset 0 0 30px rgba(56,189,248,0.05); }
    50%      { box-shadow: 0 0 80px rgba(56,189,248,0.35), inset 0 0 50px rgba(56,189,248,0.1); }
  }
  .slide-title h1 {
    font-size: 56px; font-weight: 800; letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .slide-title .sub { font-size: 18px; color: var(--muted); margin-bottom: 40px; }
  .slide-title .badges {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 48px;
  }
  .badge {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3); color: var(--cyan);
    letter-spacing: 0.5px;
  }
  .badge.purple { background: rgba(129,140,248,0.1); border-color: rgba(129,140,248,0.3); color: #818cf8; }
  .badge.green  { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.3);  color: #22c55e; }
  .stat-row {
    display: flex; gap: 32px; justify-content: center;
  }
  .stat-box {
    text-align: center; padding: 20px 28px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  }
  .stat-box .num { font-size: 36px; font-weight: 700; color: var(--cyan); }
  .stat-box .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── Normal Slide: Left (content) + Right (screenshot) ── */
  .slide-split {
    flex-direction: row;
  }
  .slide-left {
    width: 420px; min-width: 380px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 48px 36px 32px;
    position: relative;
    overflow-y: auto;
  }
  .slide-right {
    flex: 1;
    background: #0a0d14;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* slide number badge */
  .slide-num {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--cyan); text-transform: uppercase;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .slide-num::before {
    content: '';
    display: inline-block; width: 20px; height: 2px;
    background: var(--cyan); border-radius: 2px;
  }

  .slide-left h2 {
    font-size: 30px; font-weight: 800; letter-spacing: -1px;
    margin-bottom: 10px; line-height: 1.1;
  }
  .slide-left .tagline {
    font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5;
  }

  /* feature points */
  .feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .feature-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; background: var(--card2); border-radius: 10px;
    border: 1px solid var(--border);
    animation: fade-up 0.4s ease both;
  }
  .feature-item:nth-child(1) { animation-delay: 0.05s; }
  .feature-item:nth-child(2) { animation-delay: 0.12s; }
  .feature-item:nth-child(3) { animation-delay: 0.19s; }
  .feature-item:nth-child(4) { animation-delay: 0.26s; }
  .feature-item:nth-child(5) { animation-delay: 0.33s; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fi-icon {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: rgba(56,189,248,0.1);
  }
  .fi-icon.warn  { background: rgba(245,158,11,0.1); }
  .fi-icon.green { background: rgba(34,197,94,0.1); }
  .fi-icon.purple{ background: rgba(129,140,248,0.1); }
  .fi-icon.red   { background: rgba(239,68,68,0.1); }
  .fi-body strong { font-size: 13px; font-weight: 600; display: block; margin-bottom: 2px; }
  .fi-body span   { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* tech tags */
  .tech-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
  .tech-tag {
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted); font-family: 'Geist Mono', monospace;
  }

  /* screenshot frame */
  .screen-frame {
    width: 100%; max-height: 100%;
    border-radius: 10px;
    border: 1px solid rgba(56,189,248,0.12);
    box-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    overflow: hidden;
    position: relative;
  }
  .screen-frame img {
    width: 100%; height: auto; display: block;
  }

  /* callout annotations */
  .callout {
    position: absolute;
    background: rgba(7,9,14,0.92);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 11px; font-weight: 600;
    color: var(--cyan);
    white-space: nowrap;
    animation: callout-in 0.5s ease both;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  .callout::before {
    content: '●';
    margin-right: 5px; font-size: 8px;
  }
  @keyframes callout-in {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .callout-red   { border-color: var(--danger); color: var(--danger); }
  .callout-green { border-color: var(--success); color: var(--success); }
  .callout-warn  { border-color: var(--warn); color: var(--warn); }

  /* ── Architecture Slide ── */
  .slide-arch {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 48px;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(56,189,248,0.05) 0%, transparent 70%);
  }
  .arch-title { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
  .arch-sub { color: var(--muted); font-size: 14px; margin-bottom: 40px; text-align: center; }

  .arch-diagram {
    display: flex; align-items: center; gap: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 32px 40px; margin-bottom: 32px;
  }
  .arch-box {
    text-align: center; padding: 16px 20px;
    background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
    min-width: 120px;
  }
  .arch-box .ab-icon { font-size: 24px; margin-bottom: 6px; }
  .arch-box .ab-name { font-size: 12px; font-weight: 700; color: var(--cyan); }
  .arch-box .ab-tech { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .arch-arrow {
    font-size: 22px; color: var(--cyan); padding: 0 10px;
    opacity: 0.6; flex-shrink: 0;
  }

  .roadmap-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    max-width: 900px; width: 100%;
  }
  .roadmap-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px;
  }
  .roadmap-card .rc-phase {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cyan); margin-bottom: 8px;
  }
  .roadmap-card .rc-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .roadmap-card ul { padding-left: 14px; }
  .roadmap-card li { font-size: 12px; color: var(--muted); margin-bottom: 3px; line-height: 1.4; }

  /* ── Navigation ── */
  #nav {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 16px;
    background: rgba(15,17,23,0.9); border: 1px solid var(--border);
    border-radius: 40px; padding: 10px 20px;
    backdrop-filter: blur(20px);
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 6px 10px;
    border-radius: 8px; transition: color 0.2s, background 0.2s;
    display: flex; align-items: center;
  }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #slide-counter {
    font-size: 13px; color: var(--muted); min-width: 60px; text-align: center;
    font-family: 'Geist Mono', monospace;
  }
  .dot-row { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .dot.active { background: var(--cyan); width: 18px; border-radius: 3px; }

  /* slide key hint */
  #key-hint {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--muted); opacity: 1; transition: opacity 1s;
  }
  #key-hint.hidden { opacity: 0; pointer-events: none; }

  /* glow effects on slide-right */
  .glow-top { position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 65%); pointer-events: none; }
  .glow-bot { position: absolute; bottom: -100px; left: -100px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(129,140,248,0.05) 0%, transparent 65%); pointer-events: none; }
</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="slides-wrapper"></div>

<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="goSlide(-1)" title="Previous (←)">&#8592;</button>
  <div class="dot-row" id="dot-row"></div>
  <span id="slide-counter">1 / 12</span>
  <button class="nav-btn" id="btn-next" onclick="goSlide(1)" title="Next (→)">&#8594;</button>
</div>
<div id="key-hint">Press ← → arrow keys or click dots to navigate</div>

<script>
// ── Slide Data ──────────────────────────────────────────────────────────────

  // 0 — TITLE

// ── Navigation ───────────────────────────────────────────────────────────────
let current = 0;
const total = slides.length;
const dotRow = document.getElementById('dot-row');
const counter = document.getElementById('slide-counter');
const progressBar = document.getElementById('progress-bar');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const keyHint = document.getElementById('key-hint');

// Build dots
for (let i = 0; i < total; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotRow.appendChild(d);
}

function goTo(idx) {
  if (idx < 0 || idx >= total) return;
  const prev = document.getElementById(`slide-${current}`);
  prev.classList.remove('active');
  prev.classList.add('exit-left');
  setTimeout(() => prev.classList.remove('exit-left'), 400);

  current = idx;
  const next = document.getElementById(`slide-${current}`);
  next.classList.add('active');

  // Update UI
  const dots = dotRow.querySelectorAll('.dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
  counter.textContent = `${current + 1} / ${total}`;
  progressBar.style.width = `${((current + 1) / total) * 100}%`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === total - 1;
}

function goSlide(dir) { goTo(current + dir); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goSlide(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); goSlide(-1); }
});

// Hide key hint after 5s
setTimeout(() => keyHint.classList.add('hidden'), 5000);

// Init first slide
goTo(0);
</script>
